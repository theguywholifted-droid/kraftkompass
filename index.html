  <style>
    /* Feste CSS-Klasse statt dynamisch getoggelter Tailwind-Arbitrary-Value-Klasse
       (text-[#FF4D00]) — die musste Tailwind zur Laufzeit per JIT nachgenerieren,
       was bei schnellen Tab-Wechseln unzuverlässig war (sah "zufällig" aus). */
    .nav-active { color: #FF4D00 !important; filter: drop-shadow(0 0 8px rgba(255,77,0,0.55)); }
    .lang-active { background-color: #FF4D00 !important; color: #000 !important; }
    html, body {
      /* Blockiert das "Wischen zum Neuladen" auf Android/iOS */
      overscroll-behavior-y: none;
      background-color: #0a0a0a;
      font-family: 'Inter', system-ui, sans-serif;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    h1, h2 {
      font-family: 'Anton', 'Inter', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.035em;
      font-weight: 400;
    }
    /* Scrollbar verstecken für nativen App-Look */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    .hide { display: none !important; }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="text-white font-sans antialiased flex justify-center h-[100dvh]">

      </div>
      <div class="flex bg-black/40 border border-[#2a2a2a] rounded-lg p-0.5 flex-shrink-0">
        <button id="lang-btn-de" onclick="window.setLanguage('de')" class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider transition-colors">DE</button>
        <button id="lang-btn-en" onclick="window.setLanguage('en')" class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider transition-colors">EN</button>

    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="flex-1 overflow-y-auto p-6 pb-40 scroll-smooth" style="overscroll-behavior-y: contain;">
      <div id="tab-dashboard" class="hide"></div>
      <div id="tab-profile" class="hide"></div>
      <div id="tab-program" class="hide"></div>
      <div id="tab-workout" class="hide"></div>
      <div id="tab-tools" class="hide"></div>
    </main>

    <!-- Bottom Navigation optimiert für Android Safe Areas -->
    <nav class="bg-[#0d0d0d]/95 backdrop-blur-md border-t border-[#242424] grid grid-cols-5 px-2 absolute bottom-0 w-full z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.8)]" style="padding-top: 0.75rem; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));">
      <button onclick="window.switchTab('dashboard')" id="nav-dashboard" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl transition-all text-gray-500 hover:text-gray-400">
        <i data-lucide="activity" class="w-5 h-5"></i>
        <span id="nav-label-dashboard" class="text-[8px] font-bold uppercase tracking-wider mt-0.5">Dashboard</span>
      </button>
      <button onclick="window.switchTab('profile')" id="nav-profile" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl transition-all text-gray-500 hover:text-gray-400">
        <i data-lucide="user" class="w-5 h-5"></i>
        <span id="nav-label-profile" class="text-[8px] font-bold uppercase tracking-wider mt-0.5">Profil</span>
      </button>
      <button onclick="window.switchTab('program')" id="nav-program" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl transition-all text-gray-500 hover:text-gray-400">

        <span id="nav-label-program" class="text-[8px] font-bold uppercase tracking-wider mt-0.5">Programm</span>
      </button>
      <button onclick="window.switchTab('workout')" id="nav-workout" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl transition-all text-gray-500 hover:text-gray-400">
        <i data-lucide="dumbbell" class="w-5 h-5"></i>
        <span id="nav-label-workout" class="text-[8px] font-bold uppercase tracking-wider mt-0.5">Übungen</span>
      </button>
      <button onclick="window.switchTab('tools')" id="nav-tools" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl transition-all text-gray-500 hover:text-gray-400">
        <i data-lucide="calculator" class="w-5 h-5"></i>
        <span id="nav-label-tools" class="text-[8px] font-bold uppercase tracking-wider mt-0.5">Tools</span>
      </button>
    </nav>
  </div>

  <input type="file" id="file-import-global" accept=".json" class="hidden" onchange="window.importGlobalData(event)">

  <!-- In-App Player für Video-Links & PDFs, damit man die App nicht verlässt -->

    <button onclick="window.closeMediaModal()" class="self-end p-2 bg-[#141414] border border-[#2a2a2a] rounded-lg text-white mb-2 flex-shrink-0"><i data-lucide="x" class="w-5 h-5"></i></button>

      <iframe id="media-modal-frame" src="" class="hide w-full h-full border-0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
      <div id="media-modal-pdf" class="hide w-full h-full overflow-y-auto"></div>

      const customNames = window.AppState.customExercises.filter(c => c.group === 'Cardio').map(c => c.name);

      const customNames = window.AppState.customExercises.filter(c => c.group === 'Rehab Exercises').map(c => c.name);

    // --- 3. STORAGE & MIGRATION ---
    function safeArray(data) { return Array.isArray(data) ? data : []; }

    window.loadData = function() {
      const load = (k, def) => {
        try { const val = localStorage.getItem('kraftkompass_' + k); return val ? JSON.parse(val) : def; } 
        catch(e) { return def; }
      };
      window.AppState.profile = load('profile', { name: '', age: '', height: '' });
      window.AppState.metrics = safeArray(load('metrics', []));
      window.AppState.workouts = safeArray(load('workouts', []));
      window.AppState.routines = safeArray(load('routines', []));
      // Migration: Übungen pro Tag sind jetzt "Slots" (Arrays von Alternativen)
      // statt flacher Namen. Alte Daten (einfache Strings) werden automatisch
      // in Ein-Element-Slots umgewandelt, ohne dass etwas verloren geht.
      window.AppState.routines.forEach(r => {
        r.exercises = safeArray(r.exercises).map(ex => Array.isArray(ex) ? ex : [ex]);
      });
      window.AppState.customExercises = safeArray(load('custom_exercises', []));
      window.AppState.notes = load('notes', {});
      window.AppState.plans = safeArray(load('plans', []));
      window.AppState.countdowns = safeArray(load('countdowns', []));
      window.AppState.countdownsEnabled = load('countdownsEnabled', false);

      // Migration: Übungsnamen umbenennen (Katalog wurde aktualisiert).
      // Historische Workouts/Pläne/Notizen werden mitgezogen, damit
      // "Zuletzt..."-Anzeige und e1RM-Verlauf nicht verwaisen.
      // resolveRename löst auch Ketten auf (z.B. A->B->C in einem Schritt),
      // falls ein Name mehrfach umbenannt wurde, seit der Nutzer zuletzt online war.
      const resolveRename = (name) => {
        let seen = new Set();
        while (EXERCISE_RENAMES[name] && !seen.has(name)) { seen.add(name); name = EXERCISE_RENAMES[name]; }
        return name;
      };
      let renamedSomething = false;
      window.AppState.workouts.forEach(w => {
        if (w.exercise && EXERCISE_RENAMES[w.exercise]) { w.exercise = resolveRename(w.exercise); renamedSomething = true; }
      });
      window.AppState.routines.forEach(r => {
        r.exercises.forEach(slot => {
          slot.forEach((ex, i) => { if (EXERCISE_RENAMES[ex]) { slot[i] = resolveRename(ex); renamedSomething = true; } });
        });
      });
      Object.keys(EXERCISE_RENAMES).forEach(oldName => {
        if (window.AppState.notes[oldName]) {
          const newName = resolveRename(oldName);
          if (!window.AppState.notes[newName]) window.AppState.notes[newName] = window.AppState.notes[oldName];
          delete window.AppState.notes[oldName];
          renamedSomething = true;
        }
      });
      // Auch Ketten in GROUP_RENAMES auflösen (z.B. bei mehrfach umbenannten Kategorien)
      const resolveGroupRename = (name) => {
        let seen = new Set();
        while (GROUP_RENAMES[name] && !seen.has(name)) { seen.add(name); name = GROUP_RENAMES[name]; }
        return name;
      };
      window.AppState.customExercises.forEach(c => {
        if (GROUP_RENAMES[c.group]) { c.group = resolveGroupRename(c.group); renamedSomething = true; }
      });
      if (renamedSomething) {
        window.saveToStorage('workouts');
        window.saveToStorage('routines');
        window.saveToStorage('notes');
        window.saveToStorage('custom_exercises');
      }
    };

      let p = safeArray(imp.plans);

      // Auto-Migration für verwaiste Routines
      if (p.length === 0 && r.length > 0) {
          const defaultPlanId = r[0].planId || 'plan-' + Date.now();
          p.push({

            name: 'Importierter Plan',
            duration: 'unbegrenzt',
            isActive: true,
            startDate: new Date().toISOString().split('T')[0],

          r.forEach(rt => rt.planId = defaultPlanId);

      localStorage.setItem('kraftkompass_profile', JSON.stringify(imp.profile || { name: '', age: '', height: '' }));
      localStorage.setItem('kraftkompass_metrics', JSON.stringify(safeArray(imp.metrics)));
      localStorage.setItem('kraftkompass_workouts', JSON.stringify(safeArray(imp.workouts)));

      localStorage.setItem('kraftkompass_plans', JSON.stringify(p));
      localStorage.setItem('kraftkompass_notes', JSON.stringify(imp.notes || {}));
      
      const customs = imp.customExercises || imp.custom_exercises || [];

      alert(window.t("import_success"));

    window.importGlobalData = function(event) {
      const file = event.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imp = JSON.parse(e.target.result);
          if(!imp || typeof imp !== 'object') throw new Error("Format invalid");
          window.executeGlobalImport(imp);
        } catch(err) {
          alert(window.t("import_error"));
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    };

    window.getMergedGroups = function() {
      const groups = JSON.parse(JSON.stringify(BASE_EXERCISE_GROUPS));
      window.AppState.customExercises.forEach(ce => {
        const group = groups.find(g => g.name === ce.group);
        if (group && !group.exercises.includes(ce.name)) group.exercises.push(ce.name);
      });

      // Selbstheilung: Übungen, die in Plänen oder Workouts vorkommen, aber in
      // keiner Gruppe auftauchen (z.B. nie sauber als "Eigene Übung" registriert,
      // oder unter leicht anderem Namen gespeichert), landen automatisch unter
      // "Custom" statt unauffindbar zu bleiben.
      const known = new Set();
      groups.forEach(g => g.exercises.forEach(ex => known.add(ex)));
      const orphaned = new Set();
      (window.AppState.routines || []).forEach(r => {
        (r.exercises || []).forEach(slot => (slot || []).forEach(ex => { if (ex && !known.has(ex)) orphaned.add(ex); }));
      });
      (window.AppState.workouts || []).forEach(w => { if (w.exercise && !known.has(w.exercise)) orphaned.add(w.exercise); });
      if (orphaned.size > 0) {
        groups.push({ name: 'Custom', color: 'bg-gray-500/10 text-gray-300 border-gray-500/30 hover:bg-gray-500/20', exercises: Array.from(orphaned) });
      }

      groups.forEach(g => g.exercises.sort());
      return groups;
    };

    window.calculateE1RM = function(exerciseName, weight, reps, workoutDate) {
      const wNum = Number(weight) || 0;
      const rNum = Number(reps) || 0;
      if (rNum === 0 || !exerciseName) return 0;
      
      const isPullUps = exerciseName.toLowerCase().includes("pull ups") || exerciseName.toLowerCase().includes("pullups");
      const isDips = exerciseName.toLowerCase().includes("dips");

      if (isPullUps || isDips) {
        let bw = 80;
        if (window.AppState.metrics.length > 0) {
          const sorted = [...window.AppState.metrics].filter(m => m.weight != null).sort((a, b) => new Date(a.date) - new Date(b.date));
          const beforeOrOn = sorted.filter(m => new Date(m.date) <= new Date(workoutDate));
          if (beforeOrOn.length > 0) bw = Number(beforeOrOn[beforeOrOn.length - 1].weight);
          else bw = Number(sorted[0].weight);
        } else if (window.AppState.profile.weight) {
          bw = Number(window.AppState.profile.weight);
        }
        const effBw = bw * (isDips ? 0.9 : 1.0);
        return Math.max(0, ((effBw + wNum) * (1 + rNum / 30)) - effBw);
      }
      return wNum * (1 + rNum / 30);
    };

    // --- STATISTIKEN & ACHIEVEMENTS ---
    window.computeStats = function() {
      const workouts = window.AppState.workouts || [];
      const metrics = window.AppState.metrics || [];
      const groupByExercise = {};
      window.getMergedGroups().forEach(g => g.exercises.forEach(ex => { groupByExercise[ex] = g.name; }));

      let totalVolume = 0, cardioSessions = 0, cardioDistance = 0, rehabSessions = 0, prCount = 0;
      const loggedDates = new Set();
      const runningMax = {};
      const cutoff30 = new Date(); cutoff30.setDate(cutoff30.getDate() - 30);
      const groupsHit30d = new Set();

      const sorted = [...workouts].filter(w=>w&&w.date&&w.exercise).sort((a,b) => new Date(a.date) - new Date(b.date));
      sorted.forEach(w => {
        loggedDates.add(w.date);
        const cardio = window.isCardioExercise(w.exercise);
        const rehab = window.isRehabExercise(w.exercise);
        if (cardio) cardioSessions += (w.sets||[]).length;
        if (rehab) rehabSessions += 1;
        if (new Date(w.date) >= cutoff30 && groupByExercise[w.exercise]) groupsHit30d.add(groupByExercise[w.exercise]);
        (w.sets||[]).forEach(s => {
          if (cardio) {
            cardioDistance += Number(s.distance) || 0;
          } else if (s.reps != null && s.weight != null) {
            totalVolume += Number(s.reps) * Number(s.weight);
            const e1 = window.calculateE1RM(w.exercise, s.weight, s.reps, w.date);
            if (!runningMax[w.exercise] || e1 > runningMax[w.exercise]) { runningMax[w.exercise] = e1; prCount++; }
          }
        });
      });

      const dateList = Array.from(loggedDates).sort();
      let longestStreak = 0, run = 0, prevDate = null;
      dateList.forEach(d => {
        const cur = new Date(d);
        run = (prevDate && Math.round((cur - prevDate) / 86400000) === 1) ? run + 1 : 1;
        longestStreak = Math.max(longestStreak, run);
        prevDate = cur;
      });
      let currentStreak = 0;
      if (dateList.length) {
        let cursor = new Date();
        while (true) {
          const iso = cursor.toISOString().split('T')[0];
          if (loggedDates.has(iso)) { currentStreak++; cursor.setDate(cursor.getDate() - 1); }
          else break;
        }
      }
      const weekKeys = new Set();
      dateList.forEach(d => {
        const dt = new Date(d);
        const onejan = new Date(dt.getFullYear(), 0, 1);
        const week = Math.ceil((((dt - onejan) / 86400000) + onejan.getDay() + 1) / 7);
        weekKeys.add(dt.getFullYear() + '-W' + week);
      });

      return {
        totalWorkouts: workouts.length, totalVolume: Math.round(totalVolume), daysLogged: loggedDates.size,
        currentStreak, longestStreak, cardioSessions, cardioDistance: Math.round(cardioDistance * 10) / 10,
        rehabSessions, prCount, bodyLogCount: metrics.length, weeksActive: weekKeys.size,
        groupsHit30d: groupsHit30d.size
      };
    };

    window.getTrendData = function(data, type) {
      if (!data || data.length < 2) return null;
      const sorted = [...data].sort((a, b) => new Date(a.label) - new Date(b.label));
      const latestEntry = sorted[sorted.length - 1];
      const latestDate = new Date(latestEntry.label);
      
      function getHistVal(tDays, minDays, maxDays) {
        let bMatch = null, bDiff = Infinity;
        for (const e of sorted) {
          const eTime = new Date(e.label).getTime();
          const ageD = (latestDate.getTime() - eTime) / (1000 * 3600 * 24);
          if (ageD >= minDays && ageD <= maxDays) {
            const diff = Math.abs(ageD - tDays);
            if (diff < bDiff) { bDiff = diff; bMatch = e; }
          }
        }
        return bMatch;
      }
      
      const stEntry = getHistVal(20, 5, 35);
      const ltEntry = getHistVal(75, 55, 180);

      function evaluateChange(diff) {
        const abs = Math.abs(diff);
        const isNeg = diff < 0;
        let t1 = 0.1, t2 = 0.4, t3 = 1.2, t4 = 3.0; 
        if (type === 'fat' || type === 'muscle') { t1 = 0.1; t2 = 0.3; t3 = 0.8; t4 = 2.0; }
        if (abs <= t1) return { label: "stabil ➡️", style: "bg-gray-500/10 text-gray-400 border-gray-500/20" };
        
        let pIsGood = (type === 'muscle');
        if (isNeg) {
          const col = pIsGood ? "bg-red-500/10 text-red-400 border-red-500/20" : "bg-green-500/10 text-green-400 border-green-500/20";
          if (abs > t4) return { label: "stark abnehmend 📉", style: col };
          if (abs > t3) return { label: "abnehmend 📉", style: col };
          if (abs > t2) return { label: "tend. abnehmend ↘️", style: col };
          return { label: "leicht abnehmend ↘️", style: col };
        } else {
          const col = pIsGood ? "bg-green-500/10 text-green-400 border-green-500/20" : "bg-red-500/10 text-red-400 border-red-500/20";
          if (abs > t4) return { label: "stark zunehmend 📈", style: col };
          if (abs > t3) return { label: "zunehmend 📈", style: col };
          if (abs > t2) return { label: "tend. zunehmend ↗️", style: col };
          return { label: "leicht zunehmend ↗️", style: col };
        }
      }
      function fmtCompare(entry) {
        const days = Math.round((latestDate.getTime() - new Date(entry.label).getTime()) / (1000*3600*24));
        const rd = entry.label.split('-');
        const fmtDate = rd.length === 3 ? rd.reverse().slice(0,2).join('.') : entry.label;
        return { days, fmtDate };
      }

      return {
        shortTerm: stEntry ? { ...evaluateChange(latestEntry.value - stEntry.value), ...fmtCompare(stEntry) } : null,
        longTerm: ltEntry ? { ...evaluateChange(latestEntry.value - ltEntry.value), ...fmtCompare(ltEntry) } : null
      };
    };

    window.generateSVGChart = function(data, color, yLabel, referenceLines = [], chartId = 'c'+Math.random().toString(36).slice(2,8)) {
      if (!data || data.length < 2) return `<div class="flex items-center justify-center h-48 bg-black/40 rounded-xl border border-gray-800 text-gray-500 text-sm m-4">${window.t('not_enough_data')}</div>`;
      
      const parsed = data.map(d => ({ ...d, time: new Date(d.label).getTime() })).sort((a, b) => a.time - b.time);
      const w = 450, h = 270, m = { t: 25, r: 54, b: 32, l: 46 };
      const inW = w - m.l - m.r, inH = h - m.t - m.b;

      const minT = parsed[0].time;
      let tRange = parsed[parsed.length - 1].time - minT;
      if (tRange === 0) tRange = 1;

      const vals = parsed.map(d => d.value);
      const refs = referenceLines.map(r => r.value);
      const allVals = [...vals, ...refs];
      const minVRaw = Math.min(...allVals), maxVRaw = Math.max(...allVals);
      let vRangeRaw = maxVRaw - minVRaw;
      if (vRangeRaw === 0) vRangeRaw = 1;
      
      const minV = minVRaw - vRangeRaw * 0.1, maxV = maxVRaw + vRangeRaw * 0.1;
      const vRange = maxV - minV;

      const gx = t => m.l + ((t - minT) / tRange) * inW;
      const gy = v => h - m.b - ((v - minV) / vRange) * inH;

      const pts = parsed.map(d => `${gx(d.time)},${gy(d.value)}`).join(' ');
      const sma = parsed.map((d, i) => {
        const slice = parsed.slice(Math.max(0, i-19), i+1);
        const avg = slice.reduce((s,c)=>s+c.value, 0) / slice.length;
        return `${gx(d.time)},${gy(avg)}`;
      }).join(' ');

      let grids = "", ticks = [];
      if ((tRange / 86400000) >= 90) {
        let cur = new Date(new Date(minT).getFullYear(), new Date(minT).getMonth() + 1, 1);
        while (cur.getTime() <= parsed[parsed.length - 1].time) {
          const tx = gx(cur.getTime());
          grids += `<line x1="${tx}" y1="${m.t}" x2="${tx}" y2="${h-m.b}" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>`;
          ticks.push({ x: tx, l: cur.toLocaleDateString('de-DE', {month:'short', year:'2-digit'}) });
          cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
        }
      } else {
        for(let i=0; i<3; i++) {
          const tT = minT + (i/2)*tRange;
          const clo = parsed.reduce((p,c) => Math.abs(c.time-tT) < Math.abs(p.time-tT) ? c : p);
          let rawDate = clo.label.split('-');
          ticks.push({ x: gx(clo.time), l: rawDate.length === 3 ? rawDate.reverse().slice(0,2).join('.')+'.' : clo.label });
        }
        ticks = ticks.filter((v,i,a) => a.findIndex(t => Math.abs(t.x - v.x) < 20) === i);
      }

      const lastPt = parsed[parsed.length - 1];
      const circles = parsed.map(d => {
        const isLast = d === lastPt;
        return `<circle cx="${gx(d.time)}" cy="${gy(d.value)}" r="10" fill="transparent" onclick="window.showChartPoint('${chartId}','${d.label}',${d.value},'${yLabel}',this)" style="cursor:pointer;"/><circle cx="${gx(d.time)}" cy="${gy(d.value)}" r="${isLast?2.5:1.5}" fill="#111827" stroke="${color}" stroke-width="${isLast?2:1}" class="pointer-events-none"/>`;
      }).join('');
      const tickLabels = ticks.map(t => `<line x1="${t.x}" y1="${h-m.b}" x2="${t.x}" y2="${h-m.b+4}" stroke="#374151"/><text x="${t.x}" y="${h-m.b+18}" fill="#9ca3af" font-size="11" text-anchor="middle">${t.l}</text>`).join('');
      const lastFmt = (() => { const rd = lastPt.label.split('-'); return rd.length===3 ? rd.reverse().slice(0,2).join('.') : lastPt.label; })();

      return `
      <div class="w-full overflow-hidden bg-black/40 rounded-b-2xl border-t border-gray-800 p-4 relative">
        <svg viewBox="0 0 ${w} ${h}" class="w-full h-auto drop-shadow-lg overflow-visible">
          ${grids}
          <line x1="${m.l}" y1="${m.t}" x2="${w-m.r}" y2="${m.t}" stroke="#374151" stroke-dasharray="4"/>
          <line x1="${m.l}" y1="${m.t+inH/2}" x2="${w-m.r}" y2="${m.t+inH/2}" stroke="#374151" stroke-dasharray="4"/>
          <line x1="${m.l}" y1="${h-m.b}" x2="${w-m.r}" y2="${h-m.b}" stroke="#374151" stroke-dasharray="4"/>
          <text x="${m.l-6}" y="${m.t+4}" fill="#9ca3af" font-size="12" text-anchor="end">${maxVRaw.toFixed(1)} ${yLabel}</text>
          <text x="${m.l-6}" y="${h-m.b+4}" fill="#9ca3af" font-size="12" text-anchor="end">${minVRaw.toFixed(1)} ${yLabel}</text>
          ${referenceLines.map(ref => {
             const yPos = gy(ref.value);
             if (yPos >= m.t && yPos <= h - m.b) {
               return `<g><line x1="${m.l}" y1="${yPos}" x2="${w - m.r}" y2="${yPos}" stroke="#FDE047" stroke-opacity="0.85" stroke-width="1.5" stroke-dasharray="3 2" /><text x="${w - m.r + 4}" y="${yPos + 3.5}" fill="#FDE047" font-size="11" font-weight="600">${ref.label}</text></g>`;
             }
             return '';
          }).join('')}
          ${parsed.length > 2 ? `<polyline fill="none" stroke="#ffffff" stroke-width="2.5" points="${sma}" opacity="0.15" stroke-linecap="round" stroke-linejoin="round"/><polyline fill="none" stroke="#ffffff" stroke-width="1.0" stroke-dasharray="4 3" points="${sma}" opacity="0.8" stroke-linecap="round" stroke-linejoin="round"/>` : ''}
          <polyline fill="none" stroke="${color}" stroke-width="3" points="${pts}" stroke-linecap="round" stroke-linejoin="round"/>
          ${circles}
          ${tickLabels}
        </svg>
        <div id="chart-info-${chartId}" class="text-center text-sm text-gray-300 mt-2 pt-2 border-t border-gray-800/70">
          <span class="text-[#FF4D00] font-bold">${lastFmt}</span> — ${lastPt.value} ${yLabel}
        </div>
      </div>`;
    };

    window.showChartPoint = function(chartId, dateLabel, value, yLabel) {
      const el = document.getElementById('chart-info-' + chartId);
      if (!el) return;
      const rawDate = dateLabel.split('-');
      const fmtDate = rawDate.length === 3 ? rawDate.reverse().slice(0,2).join('.') : dateLabel;
      el.innerHTML = `<span class="text-[#FF4D00] font-bold">${fmtDate}</span> — ${value} ${yLabel}`;
    };

    window.callGeminiAPI = async function(prompt) {
      if(!apiKey) return "API Key fehlt. KI Funktionen im Offline-Modus limitiert.";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "Du bist Natural Bodybuilding Coach. Antworte in Deutsch." }] } };
      for (let attempt = 1, delay = 1000; attempt <= 3; attempt++, delay*=2) {
        try {
          const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (response.ok) return (await response.json()).candidates?.[0]?.content?.parts?.[0]?.text || "Fehler";
        } catch (e) { if(attempt===3) return "Netzwerkfehler."; await new Promise(r => setTimeout(r, delay)); }
      }
    }

      tabs.forEach(tab => {

          el.classList.remove('hide');

            if(tab==='dashboard') el.innerHTML = window.renderDashboard();
            if(tab==='profile') el.innerHTML = window.renderProfile();
            if(tab==='program') el.innerHTML = window.renderProgram();
            if(tab==='workout') el.innerHTML = window.renderWorkout();

    // --- 7. TABS ---
    // Berechnet Fortschritt/Fälligkeit für einen Countdown-Eintrag (0-100%,
    // Resttage, Status). "Nie erledigt" wird als sofort fällig behandelt.
    window.getCountdownStatus = function(c) {
      const today = new Date();
      const daysSince = c.lastDone ? Math.floor((today - new Date(c.lastDone)) / 86400000) : c.intervalDays;
      const pct = Math.min(100, Math.round((daysSince / c.intervalDays) * 100));
      const daysLeft = Math.max(0, c.intervalDays - daysSince);
      const isDue = daysSince >= c.intervalDays;
      return { pct, daysLeft, isDue, neverDone: !c.lastDone };
    };

    window.renderDashboard = function() {
      const state = window.AppState;
      const metrics = state.metrics || [];
      const wData = metrics.filter(m=>m && m.weight!=null && m.date).map(m=>({label:m.date, value:Number(m.weight)}));
      const fData = metrics.filter(m=>m && m.fat!=null && m.date).map(m=>({label:m.date, value:Number(m.fat)}));
      const mData = metrics.filter(m=>m && m.muscle!=null && m.date).map(m=>({label:m.date, value:Number(m.muscle)}));

      const wTrend = window.getTrendData(wData, 'weight');
      const fTrend = window.getTrendData(fData, 'fat');
      const mTrend = window.getTrendData(mData, 'muscle');

      const sData = [...metrics].sort((a,b)=>new Date(b.date)-new Date(a.date));

      const latF = sData.find(m=>m.fat!=null)?.fat || '-';
      const latM = sData.find(m=>m.muscle!=null)?.muscle || '-';

      const goalProgress = (current, target, unit) => {
        if (current === '-' || target === null || target === undefined || target === '') return '';
        const diff = Math.round((target - current) * 10) / 10;
        if (Math.abs(diff) < 0.05) return `<div class="text-[10px] px-2 py-0.5 rounded-full border whitespace-nowrap flex-shrink-0 bg-[#FF4D00]/10 text-[#FF4D00] border-[#FF4D00]/30 font-bold">🎯 ${window.t('goal_reached')}</div>`;
        const sign = diff > 0 ? '+' : '';
        return `<div class="text-[10px] px-2 py-0.5 rounded-full border whitespace-nowrap flex-shrink-0 bg-gray-500/10 text-gray-300 border-gray-500/30">${sign}${diff}${unit} ${window.t('to_go')}</div>`;
      };

      const best = {};
      (state.workouts || []).forEach(w => {
        if(!w || !w.sets || !w.exercise || !w.date) return;
        w.sets.forEach(s => {

          const e = window.calculateE1RM(w.exercise, s.weight, s.reps, w.date);
          if(!best[w.exercise] || e > best[w.exercise].e) best[w.exercise] = {ex: w.exercise, d: w.date, e, r: s.reps, w: s.weight};
          else if(e === best[w.exercise].e && new Date(w.date) > new Date(best[w.exercise].d)) best[w.exercise] = {ex: w.exercise, d: w.date, e, r: s.reps, w: s.weight};
        });
      });
      const topPRs = Object.values(best).sort((a,b)=>new Date(b.d)-new Date(a.d)).slice(0,3);

      const dView = state.dashboardView;
      const pEx = state.perfExercise;
      
      let html = `<div class="space-y-6 animate-in fade-in duration-300">
        <h2 class="text-2xl font-bold text-white mb-2 tracking-wide">${window.t('hello')}, ${state.profile.name || 'Athlet'}! 👋</h2>`;

      if (topPRs.length > 0) {

                <span class="font-semibold text-white truncate max-w-[50%]">${p.ex}</span>

                </div>
              </div>`
            }).join('')}

      html += `<div class="flex bg-[#141414] backdrop-blur-sm p-1 rounded-xl border border-[#2a2a2a] shadow-xl">

            <div class="bg-[#141414] p-4 rounded-xl border border-[#2a2a2a] flex flex-col items-center text-center"><i data-lucide="scale" class="text-[#FF4D00] mb-2 w-6 h-6"></i><span class="text-xs text-gray-400">${window.t('weight_label')}</span><span class="text-lg font-bold text-white">${latW} ${latW!=='-'?'kg':''}</span></div>
            <div class="bg-[#141414] p-4 rounded-xl border border-[#2a2a2a] flex flex-col items-center text-center"><i data-lucide="flame" class="text-[#ef4444] mb-2 w-6 h-6"></i><span class="text-xs text-gray-400">${window.t('fat_label')}</span><span class="text-lg font-bold text-white">${latF} ${latF!=='-'?'%':''}</span></div>
            <div class="bg-[#141414] p-4 rounded-xl border border-[#2a2a2a] flex flex-col items-center text-center"><i data-lucide="dumbbell" class="text-[#3b82f6] mb-2 w-6 h-6"></i><span class="text-xs text-gray-400">${window.t('muscle_label')}</span><span class="text-lg font-bold text-white">${latM} ${latM!=='-'?'%':''}</span></div>

               ${wTrend && wTrend.longTerm ? `<div class="text-[10px] px-2 py-0.5 rounded-full border whitespace-nowrap flex-shrink-0 ${wTrend.longTerm.style}"><span class="opacity-60 mr-1">${window.t('vs_prefix')} ${wTrend.longTerm.days}${window.t('days_suffix')}:</span><strong>${wTrend.longTerm.label}</strong></div>` : ''}
               ${goalProgress(latW, state.profile.targetWeight, 'kg')}
            </div>

          </div>

               ${fTrend && fTrend.longTerm ? `<div class="text-[10px] px-2 py-0.5 rounded-full border whitespace-nowrap flex-shrink-0 ${fTrend.longTerm.style}"><span class="opacity-60 mr-1">${window.t('vs_prefix')} ${fTrend.longTerm.days}${window.t('days_suffix')}:</span><strong>${fTrend.longTerm.label}</strong></div>` : ''}
               ${goalProgress(latF, state.profile.targetFat, '%')}
            </div>

      } else if (dView === 'perf') {

        } else {
          const cData = state.workouts.filter(w=>w.exercise === pEx && w.date).sort((a,b)=>new Date(a.date)-new Date(b.date)).map(w => {
            const e1rm = Math.max(...w.sets.map(s => window.calculateE1RM(w.exercise, s.weight, s.reps, w.date)));
            return {label: w.date, value: Number(e1rm.toFixed(1))};
          });
          const bestS = [];
          state.workouts.filter(w=>w.exercise===pEx && w.date).forEach(w=>w.sets.forEach(s=>{ bestS.push({d:w.date, r:s.reps, w:s.weight, e: window.calculateE1RM(w.exercise, s.weight, s.reps, w.date)}); }));
          const top3 = bestS.sort((a,b)=>b.e-a.e).slice(0,3);

          html += `<div class="space-y-6 animate-in slide-in-from-right-4 duration-300"><div class="bg-[#141414] rounded-xl p-5 border border-[#2a2a2a] shadow-xl">
            <div class="flex items-center gap-3 mb-6">
              <button onclick="window.AppState.perfViewMode='overview'; window.renderApp()" class="p-2 bg-[#141414] border border-[#2a2a2a] hover:bg-[#FF4D00]/20 rounded-lg text-[#FF4D00]"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
              <h3 class="text-xl font-bold text-white">${pEx}</h3>
            </div>
            <div class="bg-black/40 p-4 rounded-xl border border-gray-800 mb-6">
              <h4 class="text-sm font-semibold text-gray-400 border-b border-gray-700 pb-2 mb-3">${window.t('top3_sets')}</h4>
              ${top3.length > 0 ? top3.map((s,i) => {
                const rawDate = s.d.split('-');
                const fmtDate = rawDate.length === 3 ? rawDate.reverse().slice(0,2).join('.') : s.d;
                return `<div class="flex justify-between items-center text-sm mb-2 last:mb-0">
                  <div class="flex items-center gap-3"><span class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${i===0?'bg-yellow-500/20 text-yellow-500':i===1?'bg-gray-400/20 text-gray-400':'bg-[#C93D00]/20 text-[#FF4D00]'}">${i+1}</span><span class="text-gray-300">${fmtDate}</span></div>
                  <div class="font-medium text-white text-right">${s.r} × ${s.w} kg <div class="text-[#FF4D00] text-[10px]">e1RM: ${s.e.toFixed(1)} kg</div></div>
                </div>`
              }).join('') : `<span class="text-gray-500">${window.t('no_data')}</span>`}
            </div>
            <h4 class="text-sm font-semibold text-gray-400 ml-4 mb-2">${window.t('trend_e1rm')}</h4>
            ${window.generateSVGChart(cData, '#FF4D00', 'kg', [], 'e1rm')}
          </div></div>`;
        }
      } else if (dView === 'timers') {
        const countdowns = state.countdowns || [];
        if (!state.countdownsEnabled || countdowns.length === 0) {
          html += `<div class="bg-[#141414] rounded-xl border border-[#2a2a2a] p-8 text-center">
            <i data-lucide="alarm-clock" class="w-8 h-8 text-gray-600 mx-auto mb-3"></i>
            <p class="text-gray-400 text-sm">${window.t('no_countdowns_yet')}</p>
            <button onclick="window.switchTab('profile')" class="mt-4 text-xs font-bold uppercase text-[#FF4D00] border border-[#FF4D00]/40 rounded-lg px-4 py-2">${window.t('countdowns')} → ${window.t('nav_profile')}</button>
          </div>`;
        } else {
          html += `<div class="space-y-2">` + countdowns.map(c => {
            const cs = window.getCountdownStatus(c);
            const barColor = cs.isDue ? 'bg-[#FF4D00]' : (cs.pct >= 70 ? 'bg-yellow-400' : 'bg-green-500');
            const statusText = cs.neverDone ? window.t('countdown_never')
              : cs.isDue ? window.t('countdown_due')
              : `${window.t('countdown_in')} ${cs.daysLeft} ${window.t('days_unit')}`;
            return `<div class="bg-[#141414] border border-[#2a2a2a] rounded-xl px-4 py-3">
              <div class="flex justify-between items-center mb-2 gap-2">
                <span class="font-bold text-white text-sm truncate">${c.name}</span>
                <button onclick="window.resetCountdown('${c.id}')" class="flex-shrink-0 text-[10px] font-bold uppercase px-3 py-1.5 rounded-lg bg-[#FF4D00] text-black">${window.t('countdown_done')}</button>
              </div>
              <div class="w-full h-2.5 bg-black/50 rounded-full overflow-hidden"><div class="h-full ${barColor} transition-all" style="width: ${cs.pct}%"></div></div>
              <div class="text-[11px] ${cs.isDue ? 'text-[#FF4D00] font-semibold' : 'text-gray-400'} mt-1.5">${statusText}</div>
            </div>`;
          }).join('') + `</div>`;
        }
      }
      return html + `</div>`;
    };

          <div id="hist-div" class="hide space-y-3 max-h-80 overflow-y-auto">
            ${m.map(x => `<div class="bg-[#141414] p-4 rounded-xl border border-gray-800 flex justify-between items-center">

              <div class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-4"></div>
            </label>

          <div class="space-y-2">
            ${(window.AppState.countdowns || []).map(c => `
            <div class="flex items-center justify-between bg-black/40 border border-gray-800 rounded-xl px-3 py-2.5 gap-2">
              <div class="min-w-0 flex-1"><span class="text-sm font-semibold text-white block truncate">${c.name}</span><span class="text-[11px] text-gray-500">${window.t('every')} ${c.intervalDays} ${window.t('days_unit')}</span></div>
              <button onclick="window.delCountdown('${c.id}')" class="flex-shrink-0 p-1.5 text-gray-500 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>`).join('') || `<p class="text-xs text-gray-600 text-center py-2">${window.t('no_countdowns_yet')}</p>`}

          <form onsubmit="window.addCountdown(event)" class="flex gap-2">
            <input id="cd-name" placeholder="${window.t('countdown_name_placeholder')}" required class="flex-1 min-w-0 bg-black/50 text-white border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:border-[#FF4D00] outline-none"/>
            <input id="cd-days" type="number" min="1" step="1" placeholder="${window.t('days_unit')}" required class="w-20 flex-shrink-0 bg-black/50 text-white border border-gray-700 rounded-xl px-2 py-2.5 text-sm text-center focus:border-[#FF4D00] outline-none"/>
            <button type="submit" class="flex-shrink-0 bg-[#FF4D00] text-black p-2.5 rounded-xl"><i data-lucide="plus" class="w-5 h-5"></i></button>

            <button onclick="document.getElementById('file-import-global').click()" class="flex-1 bg-black/50 text-[#FF4D00] py-2.5 rounded-xl flex justify-center items-center gap-2 border border-[#2a2a2a] text-xs uppercase"><i data-lucide="upload" class="w-4 h-4"></i> ${window.t('import')}</button>

    window.saveProf = function(e) {
      e.preventDefault();
      window.AppState.profile = {
        ...window.AppState.profile,
        name: document.getElementById('p-name').value,
        age: document.getElementById('p-age').value,
        height: document.getElementById('p-height').value
      };
      window.saveToStorage('profile');
      const btn = document.getElementById('p-save-btn');
      btn.innerHTML = window.t('saved');
      setTimeout(()=> { btn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i> ' + window.t('save_profile'); lucide.createIcons(); }, 2000);
    };

    window.saveTargets = function(e) {
      e.preventDefault();
      const tw = document.getElementById('p-target-weight').value;
      const tf = document.getElementById('p-target-fat').value;
      const tm = document.getElementById('p-target-muscle').value;
      window.AppState.profile = {
        ...window.AppState.profile,
        targetWeight: tw !== '' ? Number(tw) : null,
        targetFat: tf !== '' ? Number(tf) : null,
        targetMuscle: tm !== '' ? Number(tm) : null
      };
      window.saveToStorage('profile');
      const btn = document.getElementById('p-target-save-btn');
      btn.innerHTML = window.t('saved');
      setTimeout(()=> { btn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i> ' + window.t('save_goals'); lucide.createIcons(); }, 2000);
    };

    window.saveMet = function(e) {
      e.preventDefault();
      const dt = document.getElementById('m-date').value;
      const w = document.getElementById('m-w').value;
      const f = document.getElementById('m-f').value;
      const m = document.getElementById('m-m').value;
      if(!w && !f && !m) { alert(window.t("at_least_one_value")); return; }
      const entry = { id: Date.now().toString(), date: dt };
      if(w) entry.weight = Number(w);
      if(f) entry.fat = Number(f);
      if(m) entry.muscle = Number(m);
      window.AppState.metrics.push(entry);
      window.saveToStorage('metrics');
      window.renderApp();
    };

    window.toggleCountdownsEnabled = function() {
      window.AppState.countdownsEnabled = document.getElementById('cd-enabled').checked;
      window.saveToStorage('countdownsEnabled');
    };

    window.addCountdown = function(e) {
      e.preventDefault();
      const name = document.getElementById('cd-name').value.trim();
      const days = Number(document.getElementById('cd-days').value);
      if (!name || !days || days < 1) return;
      window.AppState.countdowns.push({ id: Date.now().toString(), name, intervalDays: days, lastDone: null });
      window.saveToStorage('countdowns');
      document.getElementById('cd-name').value = '';
      document.getElementById('cd-days').value = '';
      window.renderApp();
    };

    window.delCountdown = function(id) {
      if (!confirm(window.t('confirm_delete_generic'))) return;
      window.AppState.countdowns = window.AppState.countdowns.filter(c => c.id !== id);
      window.saveToStorage('countdowns');
      window.renderApp();
    };

    window.resetCountdown = function(id) {
      const c = window.AppState.countdowns.find(x => x.id === id);
      if (!c) return;
      c.lastDone = new Date().toISOString().split('T')[0];
      window.saveToStorage('countdowns');
      window.renderApp();
    };

    window.delMet = function(id) { 
      if(confirm(window.t("delete_entry_confirm"))) {
         window.AppState.metrics = window.AppState.metrics.filter(m => m.id !== id);
         window.saveToStorage('metrics');
         window.renderApp();
      }
    };

    // Rendert die Übungsliste eines Trainingstags — wird sowohl fürs
    // Akkordeon in der Plan-Ansicht genutzt. Setzt activeRoutineId, damit
    // move/delete/add-Aktionen innerhalb der Liste den richtigen Tag treffen.
    window.renderDayExercisesList = function(r) {
      window.AppState.activeRoutineId = r.id;
      return `<div class="space-y-3 p-3 pt-2 border-t border-gray-800 bg-black/20">
        ${(r.exercises || []).map((alts, si) => {
          const showLetters = alts.length > 1;
          const altsHtml = alts.map((ex, ai) => {
            const exSafe = ex.replace(/[^a-zA-Z0-9]/g,'');
            const label = showLetters ? `${si+1}${String.fromCharCode(97+ai)}` : `${si+1}`;
            const priorLogs = window.AppState.workouts.filter(w=>w.exercise===ex).sort((a,b)=>new Date(b.date)-new Date(a.date));
            const lastLog = priorLogs[0];
            const exIsCardio = window.isCardioExercise(ex);
            const lastLogText = lastLog
              ? `${window.t('last_on')} ${lastLog.date.split('-').reverse().slice(0,2).join('.')}: ` + (lastLog.sets||[]).map(s => exIsCardio ? `${s.duration}min${s.distance?', '+s.distance+'km':''}` : `${s.reps}×${s.weight}kg`).join(', ')
              : window.t('no_entries_yet');
            const exNoteObj = window.AppState.notes[ex] || {};
            const exHint = exNoteObj.note || '';
            const exLink = exNoteObj.link || '';
            return `<div class="bg-[#141414] rounded-xl border border-[#2a2a2a] overflow-hidden shadow-lg ${ai>0 ? 'ml-5' : ''}">
            <div class="p-4 flex justify-between items-center cursor-pointer hover:bg-black/20" onclick="document.getElementById('wrap-${exSafe}').classList.toggle('hide'); window.initLogger('${ex}');">
               <div class="flex items-center gap-3 min-w-0 flex-1"><div class="w-8 h-8 flex-shrink-0 rounded-full bg-[#FF4D00]/20 text-[#FF4D00] flex items-center justify-center font-bold text-xs">${label}</div><div class="min-w-0"><span class="font-bold text-white truncate block">${ex}</span><span class="text-[11px] text-gray-500 truncate block">${lastLogText}</span>${exHint ? `<span class="text-[11px] text-gray-400 italic truncate block">💬 ${exHint}</span>` : ''}</div></div>
               <div class="flex gap-1 flex-shrink-0" onclick="event.stopPropagation()">
                 ${exLink ? `<button type="button" onclick="event.stopPropagation(); window.openMediaLink('${exLink}')" class="p-1.5 text-[#FF4D00]" title="${window.t('link_placeholder')}"><i data-lucide="play-circle" class="w-4 h-4"></i></button>` : ''}
                 ${ai===0 ? `<button onclick="window.AppState.activeRoutineId='${r.id}'; window.moveExRout(${si},'up')" class="p-1.5 text-gray-500"><i data-lucide="chevron-up" class="w-4 h-4"></i></button>
                 <button onclick="window.AppState.activeRoutineId='${r.id}'; window.moveExRout(${si},'down')" class="p-1.5 text-gray-500"><i data-lucide="chevron-down" class="w-4 h-4"></i></button>
                 <button onclick="window.AppState.activeRoutineId='${r.id}'; window.AppState.addAlternativeToSlot=${si}; window.setProgView('addExercise')" class="p-1.5 text-gray-500 hover:text-[#FF4D00]" title="${window.t('alt_hint')}"><i data-lucide="shuffle" class="w-4 h-4"></i></button>` : ''}
                 <button onclick="window.AppState.activeRoutineId='${r.id}'; window.delAltFromRout(${si},${ai})" class="p-1.5 text-red-500 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
               </div>
            </div>
            <div id="wrap-${exSafe}" class="hide p-4 pt-0 border-t border-gray-800 bg-black/30 mt-2">
               <form onsubmit="window.saveLogger(event, '${ex}')" class="pt-4 space-y-4">
                  <div class="mb-4 bg-black/40 p-3 rounded-xl border border-[#2a2a2a] text-xs shadow-inner text-gray-300">💡 ${exIsCardio ? window.t('log_session_for') : window.t('log_sets_for')} <strong class="text-[#FF4D00]">${ex}</strong>.</div>
                  <input type="date" id="log-date-${exSafe}" value="${window.AppState.loggerDate}" class="w-full bg-black/50 border border-gray-700 rounded-xl px-4 py-2 text-sm text-white focus:border-[#FF4D00] outline-none"/>
                  <div id="log-sets-${exSafe}"></div>
                  <textarea id="log-note-${exSafe}" placeholder="${window.t('notes_placeholder')}" class="w-full bg-black/40 text-gray-300 border border-gray-800 rounded-xl px-4 py-3 h-20 text-sm mt-4 focus:border-[#FF4D00] outline-none">${window.AppState.notes[ex]?.note||''}</textarea>
                  <input type="url" id="log-link-${exSafe}" placeholder="${window.t('link_placeholder')}" value="${window.AppState.notes[ex]?.link||''}" class="w-full bg-black/40 text-gray-300 border border-gray-800 rounded-xl px-4 py-2.5 text-sm mt-2 focus:border-[#FF4D00] outline-none"/>
                  <button type="button" onclick="window.saveExerciseNote('${ex}', this)" class="w-full py-2 bg-black/40 border border-[#2a2a2a] text-gray-300 rounded-xl text-xs font-semibold uppercase tracking-wide">${window.t('save_note')}</button>
                  <button id="log-btn-${exSafe}" type="submit" class="w-full py-3 bg-[#FF4D00] text-black font-extrabold rounded-xl uppercase text-sm shadow-md">${window.t('save')}</button>
               </form>
            </div>
          </div>`;
          }).join('');
          return altsHtml;
        }).join('')}

                  <button onclick="window.moveRout('${r.id}','up')" class="p-1.5 text-gray-500 hover:text-[#FF4D00]"><i data-lucide="chevron-up" class="w-3.5 h-3.5"></i></button>

                  <button onclick="window.delRout('${r.id}')" class="p-1.5 text-gray-500 hover:text-red-400"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>

      else if (v === 'addExercise') {

        const grps = window.getMergedGroups().map(g=>({...g, exercises:g.exercises.filter(x=>x.toLowerCase().includes(sq))})).filter(g=>g.exercises.length>0);
        const isAddingAlt = window.AppState.addAlternativeToSlot !== null && window.AppState.addAlternativeToSlot !== undefined;
        html += `<div class="flex items-center gap-3 mb-2"><button onclick="window.AppState.addAlternativeToSlot=null; window.setProgView('plan-detail')" class="p-2 bg-[#141414] border border-[#2a2a2a] rounded-lg text-[#FF4D00]"><i data-lucide="arrow-left" class="w-5 h-5"></i></button><h2 class="text-2xl font-bold text-white">${isAddingAlt ? window.t('choose_alternative') : window.t('choose_exercise')}</h2></div>

        <div class="relative h-12 mb-4"><div class="absolute left-3 top-0 h-12 flex items-center pointer-events-none"><i data-lucide="search" class="w-4 h-4 text-gray-500"></i></div><input oninput="window.AppState.programSearchQuery=this.value; window.filterExercises(this.value, 'prog-ex-list')" value="${window.AppState.programSearchQuery}" placeholder="${window.t('search')}" class="w-full h-12 bg-[#141414] text-white border border-[#2a2a2a] rounded-xl pl-10 pr-4 text-sm focus:border-[#FF4D00] outline-none"/></div>

    window.createPlan = function(e) {
      e.preventDefault();
      const name = document.getElementById('new-plan-name').value.trim();
      const durEl = document.getElementById('new-plan-dur');
      let dur = durEl.value;
      if(dur==='custom') dur = document.getElementById('custom-dur').value.trim();
      if(!name) return;

      const today = new Date().toISOString().split('T')[0];
      window.AppState.plans.forEach(p => { if(p.isActive) { p.isActive = false; p.endDate = today; } });
      
      const newId = 'plan-'+Date.now();
      window.AppState.plans.push({id:newId, name, duration:dur||'unbegrenzt', isActive:true, startDate:today, endDate:null});
      window.saveToStorage('plans');
      window.setProgView('list');
    };

    window.createRout = function(e) {
      e.preventDefault();
      const n = document.getElementById('new-rout-name').value.trim();
      const pId = window.AppState.activePlanId;
      if(!n || !pId) return;
      const ro = window.AppState.routines.filter(r=>r.planId===pId);
      const rId = 'rout-'+Date.now();
      window.AppState.routines.push({id:rId, name:n, exercises:[], order:ro.length, planId:pId});
      window.saveToStorage('routines');
      window.renderApp();
    };

    window.addExToRout = function(exName) {
      const pId = window.AppState.activePlanId;
      const rId = window.AppState.activeRoutineId;
      const r = window.AppState.routines.find(x=>x.id===rId);
      if(!r) return;
      const slotIdx = window.AppState.addAlternativeToSlot;
      if (slotIdx !== null && slotIdx !== undefined && r.exercises[slotIdx]) {
        // Als Alternative zu einem bestehenden Slot hinzufügen (z.B. 1a/1b)
        r.exercises[slotIdx].push(exName);
      } else {
        // Neue Übung = neuer Slot
        r.exercises.push([exName]);
      }
      window.AppState.addAlternativeToSlot = null;
      window.saveToStorage('routines');
      window.AppState.expandedDayId = rId;
      window.setProgView('plan-detail', pId, rId);
    };

    window.delAltFromRout = function(slotIdx, altIdx) {
      const rId = window.AppState.activeRoutineId;
      const r = window.AppState.routines.find(x=>x.id===rId);
      if(!r) return;
      const slot = r.exercises[slotIdx];
      if(!slot) return;
      if (slot.length <= 1) {
        if(!confirm(window.t("delete_exercise_confirm"))) return;
        r.exercises.splice(slotIdx, 1);
      } else {
        if(!confirm(window.t("delete_alt_confirm"))) return;
        slot.splice(altIdx, 1);
      }
      window.saveToStorage('routines');
      window.renderApp();
    };

    window.moveExRout = function(idx, dir) {
      const rId = window.AppState.activeRoutineId;
      const r = window.AppState.routines.find(x=>x.id===rId);
      const arr = r.exercises;
      if(dir==='up' && idx>0) { [arr[idx-1], arr[idx]] = [arr[idx], arr[idx-1]]; }
      if(dir==='down' && idx<arr.length-1) { [arr[idx+1], arr[idx]] = [arr[idx], arr[idx+1]]; }
      window.saveToStorage('routines');
      window.renderApp();
    };

    window.normalizeRoutineOrder = function(planId) {
      const ro = window.AppState.routines.filter(r => r.planId === planId);
      ro.sort((a,b) => (a.order ?? 0) - (b.order ?? 0));
      let changed = false;
      ro.forEach((r, i) => { if (r.order !== i) { r.order = i; changed = true; } });
      if (changed) window.saveToStorage('routines');
    };

    window.moveRout = function(id, dir) {
      // Ermittelt die Plan-ID direkt aus dem Tag selbst, statt sich auf
      // AppState.activePlanId zu verlassen (kann sonst bei bestimmten
      // Navigationspfaden veraltet sein und das Verschieben blockieren).
      const routine = window.AppState.routines.find(r => r.id === id);
      if (!routine) return;
      const pId = routine.planId;
      window.normalizeRoutineOrder(pId);
      const ro = window.AppState.routines.filter(r=>r.planId===pId).sort((a,b)=>a.order-b.order);
      const idx = ro.findIndex(r=>r.id===id);
      if(dir==='up'&&idx>0) { let t=ro[idx].order; ro[idx].order=ro[idx-1].order; ro[idx-1].order=t; }
      if(dir==='down'&&idx<ro.length-1) { let t=ro[idx].order; ro[idx].order=ro[idx+1].order; ro[idx+1].order=t; }
      window.saveToStorage('routines');
      window.renderApp();
    }

    window.delPlan = function(id) { 
      if(confirm(window.t("plan_delete_confirm"))) {
        window.AppState.routines = window.AppState.routines.filter(r => r.planId !== id);
        window.AppState.plans = window.AppState.plans.filter(p => p.id !== id);
        window.saveToStorage('routines');
        window.saveToStorage('plans');
        window.renderApp();
      }
    }
    
    window.delRout = function(id) { 
      if(confirm(window.t("day_delete_confirm"))) {
        window.AppState.routines = window.AppState.routines.filter(r => r.id !== id);
        window.saveToStorage('routines');
        window.renderApp();
      }
    }

    window.activatePlan = function(id) {
       const today = new Date().toISOString().split('T')[0];
       window.AppState.plans.forEach(p => { if (p.isActive) { p.isActive = false; p.endDate = today; } });
       const p = window.AppState.plans.find(x => x.id === id);
       if (p) { p.isActive = true; p.endDate = null; }
       window.saveToStorage('plans');
       window.renderApp();
    }

    window.savePlanDetails = function(e) {
       e.preventDefault();
       const name = document.getElementById('edit-plan-name').value.trim();
       const dur = document.getElementById('edit-plan-dur').value.trim() || 'unbegrenzt';
       const aPlan = window.AppState.plans.find(p => p.id === window.AppState.activePlanId);
       if(aPlan && name) {
         aPlan.name = name;
         aPlan.duration = dur;
         window.saveToStorage('plans');
         window.AppState.isEditingPlan = false;
         window.renderApp();
       }
    }

    window.saveRoutName = function(e) {
       e.preventDefault();
       const name = document.getElementById('edit-rout-name').value.trim();
       const aRout = window.AppState.routines.find(r => r.id === window.AppState.activeRoutineId);
       if(aRout && name) {
         aRout.name = name;
         window.saveToStorage('routines');
         window.AppState.isEditingRout = false;
         window.renderApp();
       }
    }

    // Öffnet einen Video- oder PDF-Link direkt in der App (Modal + iframe),
    // statt YouTube/PDF im externen Browser/App zu öffnen.
    window.openMediaLink = function(url) {
      if (!url) return;
      document.getElementById('media-modal').classList.remove('hide');
      const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]+)/);
      if (ytMatch) {
        window.showMediaFrame(`https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1&playsinline=1`);
      } else if (url.toLowerCase().endsWith('.pdf')) {
        window.renderPdfInModal(url);
      } else {
        window.showMediaFrame(url);
      }
    };

    window.showMediaFrame = function(src) {
      const pdfEl = document.getElementById('media-modal-pdf');
      pdfEl.classList.add('hide');
      pdfEl.innerHTML = '';
      const frame = document.getElementById('media-modal-frame');
      frame.classList.remove('hide');
      frame.src = src;
    };

    // Rendert PDFs selbst über PDF.js auf <canvas> statt sich auf den
    // (auf Mobilgeräten oft fehlenden) nativen PDF-Viewer des Browsers zu
    // verlassen — sonst zeigen Handys nur eine "Herunterladen"-Kachel an.
    window.renderPdfInModal = async function(url) {
      const frame = document.getElementById('media-modal-frame');
      frame.classList.add('hide');
      frame.src = '';
      const pdfEl = document.getElementById('media-modal-pdf');
      pdfEl.classList.remove('hide');
      pdfEl.innerHTML = `<div class="flex items-center justify-center h-full text-gray-400 text-sm">Lädt…</div>`;
      try {
        if (typeof pdfjsLib === 'undefined') throw new Error('pdf.js nicht geladen');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdf = await pdfjsLib.getDocument(url).promise;
        pdfEl.innerHTML = '';
        const scale = Math.min(2, (window.devicePixelRatio || 1) * 1.3);
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale });
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          canvas.style.width = '100%';
          canvas.style.height = 'auto';
          canvas.style.display = 'block';
          canvas.style.marginBottom = '8px';
          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport }).promise;
          pdfEl.appendChild(canvas);
        }
      } catch (err) {
        console.error('PDF-Render-Fehler:', err);
        pdfEl.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center text-gray-400 text-sm gap-3 px-6">
          <span>PDF konnte nicht geladen werden.</span>
          <a href="${url}" target="_blank" rel="noopener" class="text-[#FF4D00] underline">Direkt öffnen</a>
        </div>`;
      }
    };

    window.toggleExGroup = function(id) {

    window.filterExercises = function(val, containerId) {
       const q = val.toLowerCase();
       const groups = document.querySelectorAll(`#${containerId} .ex-group`);
       groups.forEach(g => {
          let vis = 0;
          const btns = g.querySelectorAll('.ex-btn');
          btns.forEach(b => {
             if (b.getAttribute('data-ex').toLowerCase().includes(q)) { b.classList.remove('hide'); vis++; }
             else { b.classList.add('hide'); }
          });
          const body = g.querySelector('.ex-group-body');
          if (q === '') {
             // Suche geleert: alle Gruppen zeigen, aber wieder einklappen
             g.classList.remove('hide');
             if (body) body.classList.add('hide');
          } else if (vis === 0) {
             g.classList.add('hide');
          } else {
             // Treffer: Gruppe zeigen und automatisch aufklappen
             g.classList.remove('hide');
             if (body) body.classList.remove('hide');
          }
       });
    };

    window.handleExportPlanObj = function(planId) {
      const plan = window.AppState.plans.find(p => p.id === planId);
      if(!plan) return;
      const rts = window.AppState.routines.filter(r => r.planId === plan.id);
      const exp = { version: "kraftkompass-plan-v1", plan: { name: plan.name, duration: plan.duration }, routines: rts.map(r => ({ name: r.name, exercises: r.exercises, order: r.order })) };
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exp));
      const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", `Plan_${plan.name.replace(/\s+/g, '_')}.json`);
      document.body.appendChild(dl); dl.click(); dl.remove();
    };

    window.handleImportPlanObj = function(event) {
      const file = event.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
         try {
            const imp = JSON.parse(e.target.result);
            if (imp.metrics && imp.workouts) { window.executeGlobalImport(imp); return; } // Globales Backup erkannt!
            if (imp.version !== "kraftkompass-plan-v1" || !imp.plan || !imp.routines) throw new Error("Format");
            
            const newPlanId = 'plan-' + Date.now();
            const today = new Date().toISOString().split('T')[0];
            window.AppState.plans.forEach(p => { if (p.isActive) { p.isActive = false; p.endDate = today; } });
            window.AppState.plans.push({ id: newPlanId, name: imp.plan.name + " (Importiert)", duration: imp.plan.duration || "unbegrenzt", isActive: true, startDate: today, endDate: null });
            imp.routines.forEach((r, idx) => { window.AppState.routines.push({ id: `routine-imp-${Date.now()}-${idx}`, name: r.name, exercises: safeArray(r.exercises).map(ex => Array.isArray(ex) ? ex : [ex]), order: r.order !== undefined ? r.order : idx, planId: newPlanId }); });
            window.saveToStorage('plans'); window.saveToStorage('routines');
            alert(window.t("plan_import_success")); window.renderApp();
         } catch(err) { alert(window.t("plan_import_error")); }
      };
      reader.readAsText(file); event.target.value = '';
    };

    window.initLogger = function(exName) {
      const isCardio = window.isCardioExercise(exName);

      const wList = window.AppState.workouts.filter(x => x.exercise === exName).sort((a,b) => new Date(b.date) - new Date(a.date));
      if(wList.length > 0 && wList[0].sets) {
        window.AppState.loggerSets = isCardio
          ? wList[0].sets.map(s => ({duration: s.duration ?? '', distance: s.distance ?? ''}))
          : wList[0].sets.map(s => ({reps: s.reps, weight: s.weight}));
      }
      setTimeout(()=> window.renderLoggerHTML(exName), 10);
    }
    window.addLogSet = function(exName) {
      window.AppState.loggerSets.push(window.isCardioExercise(exName) ? {duration:'', distance:''} : {reps:'',weight:''});
      window.renderLoggerHTML(exName);
    }

    window.saveExerciseNote = function(exName, btnEl) {

      const noteEl = document.getElementById('log-note-'+safeExName);

      const link = linkEl ? linkEl.value.trim() : '';

    window.saveLogger = async function(e, exName) {
      e.preventDefault();
      const isCardio = window.isCardioExercise(exName);
      const valid = isCardio
        ? window.AppState.loggerSets.filter(s=>s.duration!=='').map(s=>({duration:Number(s.duration), distance: s.distance!=='' && s.distance!=null ? Number(s.distance) : undefined}))
        : window.AppState.loggerSets.filter(s=>s.reps!==''&&s.weight!=='').map(s=>({reps:Number(s.reps), weight:Number(s.weight)}));
      if(!valid.length) return;
      const safeExName = exName.replace(/[^a-zA-Z0-9]/g,'');
      const dt = document.getElementById('log-date-'+safeExName).value;
      const note = document.getElementById('log-note-'+safeExName).value;
      const linkEl = document.getElementById('log-link-'+safeExName);
      const link = linkEl ? linkEl.value.trim() : (window.AppState.notes[exName]?.link || '');
      const existingNote = window.AppState.notes[exName] || {};
      if(note !== (existingNote.note || '') || link !== (existingNote.link || '')) {
         window.AppState.notes[exName] = { note, link };
         window.saveToStorage('notes');
      }
      const btn = document.getElementById('log-btn-'+safeExName);
      btn.innerText = "Speichert...";
      await window.saveWorkoutToDb({date:dt, exercise:exName, sets:valid});
      btn.innerHTML = "<i data-lucide='check' class='w-4 h-4 inline mr-1'></i> " + window.t('saved');

      setTimeout(() => { 
         const w = document.getElementById('wrap-'+safeExName);
         if(w) w.classList.add('hide'); 
         window.renderApp(); 
      }, 700);
    }

    window.updateE1RMCalc = function() {
      const exEl = document.getElementById('e1rm-ex');

      if (!exEl || !wEl || !rEl) return;
      const ex = exEl.value.trim();
      const w = Number(wEl.value) || 0;
      const r = Number(rEl.value) || 0;
      const today = new Date().toISOString().split('T')[0];
      const e1rm = window.calculateE1RM(ex, w, r, today);

      document.getElementById('e1rm-result').innerText = e1rm.toFixed(1);

      const isBW = /dips|pull ?ups/.test(ex.toLowerCase());
      document.getElementById('e1rm-bw-hint').classList.toggle('hide', !isBW);

      const table = document.getElementById('e1rm-table');

        const neededW = e1rm / (1 + rt / 30);
        return `<div class="bg-black/40 border border-gray-800 rounded-lg py-2 text-center"><span class="block text-[10px] text-gray-500 uppercase font-bold">${rt} Reps</span><span class="text-sm font-bold text-white">${neededW.toFixed(1)} kg</span></div>`;

    window.updateToolsCalc = function() {
       const w = Number(document.getElementById('c-w').value) || 80;
       const h = Number(document.getElementById('c-h').value) || 180;
       const a = Number(document.getElementById('c-a').value) || 25;
       const bfRaw = document.getElementById('c-bf').value;
       const f = bfRaw ? Number(bfRaw) : null;
       const g = document.getElementById('c-g').value;
       const goal = document.getElementById('c-goal').value;

       let bmr = (f && f > 0) ? (370 + 21.6 * (w * (1 - f/100))) : ((g==='male') ? (10*w + 6.25*h - 5*a + 5) : (10*w + 6.25*h - 5*a - 161));
       const tdee = bmr * 1.55;
       let tg = tdee;
       if(goal==='cut') tg-=500; else if(goal==='bulk') tg+=300;

       document.getElementById('res-bmr').innerText = Math.round(bmr);
       document.getElementById('res-tdee').innerText = Math.round(tdee);
       document.getElementById('res-cal').innerText = Math.round(tg);
    };

    // Ebenfalls nirgends definiert. Ohne apiKey liefert callGeminiAPI einen
    // Hinweistext zurück, damit die Buttons nicht ins Leere laufen.
    window.genAICoach = async function() {
      const btn = document.getElementById('ai-btn-coach');
      const out = document.getElementById('ai-out-coach');
      if(!btn || !out) return;
      btn.disabled = true;
      out.innerHTML = `<div class="text-xs text-gray-400 mt-3">Analysiere...</div>`;
      const p = window.AppState.profile;
      const prompt = `Athlet: ${p.name||'Unbekannt'}, Alter ${p.age||'-'}, Größe ${p.height||'-'}cm. Gib eine kurze, motivierende Trainingsanalyse basierend auf diesen Daten.`;
      const res = await window.callGeminiAPI(prompt);
      out.innerHTML = `<div class="mt-3 bg-black/40 p-3 rounded-xl border border-gray-800 text-sm text-gray-200 whitespace-pre-wrap">${res}</div>`;
      btn.disabled = false;
    };

    window.genAIPlan = async function() {
      const btn = document.getElementById('ai-btn-plan');
      const out = document.getElementById('ai-out-plan');
      if(!btn || !out) return;
      btn.disabled = true;
      out.innerHTML = `<div class="text-xs text-gray-400 mt-3">Erstelle Speiseplan...</div>`;
      const calEl = document.getElementById('res-cal');
      const cal = calEl ? calEl.innerText : '2500';
      const prompt = `Erstelle einen kurzen Beispiel-Speiseplan für ${cal} kcal pro Tag für einen Natural Bodybuilder.`;
      const res = await window.callGeminiAPI(prompt);
      out.innerHTML = `<div class="mt-3 bg-black/40 p-3 rounded-xl border border-gray-800 text-sm text-gray-200 whitespace-pre-wrap">${res}</div>`;
      btn.disabled = false;
    };

    // --- 10. APP BOOTSTRAP ---
    // WICHTIG: Dieser Block hat vorher komplett gefehlt (window.bootApp war nirgends
    // definiert) -> die App ist deshalb nie gestartet. Jetzt: Daten aus localStorage
    // laden und den Start-Tab rendern.
    window.bootApp = function() {
      window.loadData();
      const savedLang = localStorage.getItem('kraftkompass_language');
      if (savedLang) window.AppState.language = savedLang;
      window.applyStaticTranslations();
      window.switchTab(window.AppState.activeTab || 'dashboard');
    };

    document.addEventListener("DOMContentLoaded", window.bootApp);

    // --- 11. PWA: SERVICE WORKER REGISTRIEREN ---
    // Läuft nur, wenn über http(s)/localhost aufgerufen (nicht bei file://).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.log('Service Worker Registrierung übersprungen:', err);
        });
      });
    }
  </script>
</body>
</html>
