<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Kraftkompass</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kraftkompass">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    html, body {
      /* Blockiert das "Wischen zum Neuladen" auf Android/iOS */
      overscroll-behavior-y: none;
      background-color: #0a0a0a;
      font-family: 'Inter', system-ui, sans-serif;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    h1, h2 {
      font-family: 'Anton', 'Inter', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.035em;
      font-weight: 400;
    }
    /* Scrollbar verstecken für nativen App-Look */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    .hide { display: none !important; }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="text-white font-sans antialiased flex justify-center h-[100dvh]">

  <div class="w-full max-w-md bg-black/50 h-full flex flex-col shadow-2xl relative md:border-x border-gray-800">
    
    <!-- Header -->
    <header class="bg-[#0d0d0d]/95 backdrop-blur-md border-b border-[#242424] px-6 py-4 sticky top-0 z-10 flex justify-between items-center shadow-[0_4px_20px_rgba(0,0,0,0.8)]">
      <div class="flex items-center gap-3">
        <svg width="36" height="36" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="46" stroke="#FF4D00" stroke-width="4" fill="#111827"/>
          <circle cx="50" cy="50" r="38" stroke="#4b5563" stroke-width="2" stroke-dasharray="4 4" />
          <path d="M50 10 L58 42 L90 50 L58 58 L50 90 L42 58 L10 50 L42 42 Z" fill="#FF4D00"/>
          <line x1="26" y1="26" x2="74" y2="74" stroke="#9CA3AF" stroke-width="7" stroke-linecap="round"/>
          <line x1="26" y1="74" x2="74" y2="26" stroke="#9CA3AF" stroke-width="7" stroke-linecap="round"/>

          <circle cx="74" cy="26" r="8" fill="#4B5563"/>

        <h1 class="text-xl font-black text-white tracking-widest uppercase flex flex-col leading-none">
          <span>Kraftkompass<span class="text-[#FF4D00]">.</span></span>
          <span class="text-[9px] font-bold text-gray-400 tracking-[0.25em] mt-1">Natural Bodybuilding</span>
        </h1>
      </div>
      <div class="flex bg-black/40 border border-[#2a2a2a] rounded-lg p-0.5 flex-shrink-0">
        <button id="lang-btn-de" onclick="window.setLanguage('de')" class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider transition-colors">DE</button>
        <button id="lang-btn-en" onclick="window.setLanguage('en')" class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider transition-colors">EN</button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="flex-1 overflow-y-auto p-6 pb-40 scroll-smooth" style="overscroll-behavior-y: contain;">
      <div id="tab-dashboard" class="hide"></div>
      <div id="tab-profile" class="hide"></div>
      <div id="tab-program" class="hide"></div>
      <div id="tab-workout" class="hide"></div>
      <div id="tab-tools" class="hide"></div>
    </main>

    <!-- Bottom Navigation optimiert für Android Safe Areas -->
    <nav class="bg-[#0d0d0d]/95 backdrop-blur-md border-t border-[#242424] grid grid-cols-5 px-2 absolute bottom-0 w-full z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.8)]" style="padding-top: 0.75rem; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));">
      <button onclick="window.switchTab('dashboard')" id="nav-dashboard" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl transition-all text-gray-500 hover:text-gray-400">
        <i data-lucide="activity" class="w-5 h-5"></i>
        <span id="nav-label-dashboard" class="text-[8px] font-bold uppercase tracking-wider mt-0.5">Dashboard</span>
      </button>
      <button onclick="window.switchTab('profile')" id="nav-profile" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl transition-all text-gray-500 hover:text-gray-400">
        <i data-lucide="user" class="w-5 h-5"></i>
        <span id="nav-label-profile" class="text-[8px] font-bold uppercase tracking-wider mt-0.5">Profil</span>
      </button>
      <button onclick="window.switchTab('program')" id="nav-program" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl transition-all text-gray-500 hover:text-gray-400">
        <i data-lucide="clipboard-list" class="w-5 h-5"></i>
        <span id="nav-label-program" class="text-[8px] font-bold uppercase tracking-wider mt-0.5">Programm</span>
      </button>
      <button onclick="window.switchTab('workout')" id="nav-workout" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl transition-all text-gray-500 hover:text-gray-400">
        <i data-lucide="dumbbell" class="w-5 h-5"></i>
        <span id="nav-label-workout" class="text-[8px] font-bold uppercase tracking-wider mt-0.5">Übungen</span>
      </button>
      <button onclick="window.switchTab('tools')" id="nav-tools" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl transition-all text-gray-500 hover:text-gray-400">
        <i data-lucide="calculator" class="w-5 h-5"></i>
        <span id="nav-label-tools" class="text-[8px] font-bold uppercase tracking-wider mt-0.5">Tools</span>
      </button>
    </nav>
  </div>

  <!-- Unsichtbare Datei-Inputs für Importe -->
  <input type="file" id="file-import-plan" accept=".json" class="hidden" onchange="window.handleImportPlanObj(event)">
  <input type="file" id="file-import-global" accept=".json" class="hidden" onchange="window.importGlobalData(event)">

  <!-- In-App Player für Video-Links & PDFs, damit man die App nicht verlässt -->
  <div id="media-modal" class="hide fixed inset-0 z-50 bg-black/95 flex flex-col p-3" style="padding-top: max(12px, env(safe-area-inset-top, 12px));">
    <button onclick="window.closeMediaModal()" class="self-end p-2 bg-[#141414] border border-[#2a2a2a] rounded-lg text-white mb-2 flex-shrink-0"><i data-lucide="x" class="w-5 h-5"></i></button>
    <div class="flex-1 min-h-0 rounded-xl overflow-hidden bg-black">
      <iframe id="media-modal-frame" src="" class="hide w-full h-full border-0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
      <div id="media-modal-pdf" class="hide w-full h-full overflow-y-auto"></div>
    </div>
  </div>

      const cardioGroup = BASE_EXERCISE_GROUPS.find(g => g.name === 'Cardio');
      const catalogNames = cardioGroup ? cardioGroup.exercises : [];
      const customNames = window.AppState.customExercises.filter(c => c.group === 'Cardio').map(c => c.name);
      return catalogNames.includes(exName) || customNames.includes(exName);
    };

      const customNames = window.AppState.customExercises.filter(c => c.group === 'Rehab Exercises').map(c => c.name);

    // --- 3. STORAGE & MIGRATION ---
    function safeArray(data) { return Array.isArray(data) ? data : []; }

    window.loadData = function() {
      const load = (k, def) => {
        try { const val = localStorage.getItem('kraftkompass_' + k); return val ? JSON.parse(val) : def; } 
        catch(e) { return def; }
      };
      window.AppState.profile = load('profile', { name: '', age: '', height: '' });
      window.AppState.metrics = safeArray(load('metrics', []));
      window.AppState.workouts = safeArray(load('workouts', []));
      window.AppState.routines = safeArray(load('routines', []));
      // Migration: Übungen pro Tag sind jetzt "Slots" (Arrays von Alternativen)
      // statt flacher Namen. Alte Daten (einfache Strings) werden automatisch
      // in Ein-Element-Slots umgewandelt, ohne dass etwas verloren geht.
      window.AppState.routines.forEach(r => {
        r.exercises = safeArray(r.exercises).map(ex => Array.isArray(ex) ? ex : [ex]);
      });
      window.AppState.customExercises = safeArray(load('custom_exercises', []));
      window.AppState.notes = load('notes', {});
      window.AppState.plans = safeArray(load('plans', []));
      window.AppState.reminderSettings = load('reminder_settings', { enabled: true, cardioDays: 3, rehabDays: 3 });

      // Migration: Übungsnamen umbenennen (Katalog wurde aktualisiert).
      // Historische Workouts/Pläne/Notizen werden mitgezogen, damit
      // "Zuletzt..."-Anzeige und e1RM-Verlauf nicht verwaisen.
      // resolveRename löst auch Ketten auf (z.B. A->B->C in einem Schritt),
      // falls ein Name mehrfach umbenannt wurde, seit der Nutzer zuletzt online war.
      const resolveRename = (name) => {
        let seen = new Set();
        while (EXERCISE_RENAMES[name] && !seen.has(name)) { seen.add(name); name = EXERCISE_RENAMES[name]; }
        return name;
      };
      let renamedSomething = false;
      window.AppState.workouts.forEach(w => {
        if (w.exercise && EXERCISE_RENAMES[w.exercise]) { w.exercise = resolveRename(w.exercise); renamedSomething = true; }
      });
      window.AppState.routines.forEach(r => {
        r.exercises.forEach(slot => {
          slot.forEach((ex, i) => { if (EXERCISE_RENAMES[ex]) { slot[i] = resolveRename(ex); renamedSomething = true; } });
        });
      });
      Object.keys(EXERCISE_RENAMES).forEach(oldName => {
        if (window.AppState.notes[oldName]) {
          const newName = resolveRename(oldName);
          if (!window.AppState.notes[newName]) window.AppState.notes[newName] = window.AppState.notes[oldName];
          delete window.AppState.notes[oldName];
          renamedSomething = true;
        }
      });
      // Auch Ketten in GROUP_RENAMES auflösen (z.B. bei mehrfach umbenannten Kategorien)
      const resolveGroupRename = (name) => {
        let seen = new Set();
        while (GROUP_RENAMES[name] && !seen.has(name)) { seen.add(name); name = GROUP_RENAMES[name]; }
        return name;
      };
      window.AppState.customExercises.forEach(c => {
        if (GROUP_RENAMES[c.group]) { c.group = resolveGroupRename(c.group); renamedSomething = true; }
      });
      if (renamedSomething) {
        window.saveToStorage('workouts');
        window.saveToStorage('routines');
        window.saveToStorage('notes');
        window.saveToStorage('custom_exercises');
      }
    };

    window.getMergedGroups = function() {
      const groups = JSON.parse(JSON.stringify(BASE_EXERCISE_GROUPS));
      window.AppState.customExercises.forEach(ce => {
        const group = groups.find(g => g.name === ce.group);
        if (group && !group.exercises.includes(ce.name)) group.exercises.push(ce.name);
      });

      // Selbstheilung: Übungen, die in Plänen oder Workouts vorkommen, aber in
      // keiner Gruppe auftauchen (z.B. nie sauber als "Eigene Übung" registriert,
      // oder unter leicht anderem Namen gespeichert), landen automatisch unter
      // "Custom" statt unauffindbar zu bleiben.
      const known = new Set();
      groups.forEach(g => g.exercises.forEach(ex => known.add(ex)));
      const orphaned = new Set();
      (window.AppState.routines || []).forEach(r => {
        (r.exercises || []).forEach(slot => (slot || []).forEach(ex => { if (ex && !known.has(ex)) orphaned.add(ex); }));
      });
      (window.AppState.workouts || []).forEach(w => { if (w.exercise && !known.has(w.exercise)) orphaned.add(w.exercise); });
      if (orphaned.size > 0) {
        groups.push({ name: 'Custom', color: 'bg-gray-500/10 text-gray-300 border-gray-500/30 hover:bg-gray-500/20', exercises: Array.from(orphaned) });
      }

      groups.forEach(g => g.exercises.sort());
      return groups;
    };

    window.calculateE1RM = function(exerciseName, weight, reps, workoutDate) {
      const wNum = Number(weight) || 0;
      const rNum = Number(reps) || 0;
      if (rNum === 0 || !exerciseName) return 0;
      
      const isPullUps = exerciseName.toLowerCase().includes("pull ups") || exerciseName.toLowerCase().includes("pullups");
      const isDips = exerciseName.toLowerCase().includes("dips");

      if (isPullUps || isDips) {
        let bw = 80;
        if (window.AppState.metrics.length > 0) {
          const sorted = [...window.AppState.metrics].filter(m => m.weight != null).sort((a, b) => new Date(a.date) - new Date(b.date));
          const beforeOrOn = sorted.filter(m => new Date(m.date) <= new Date(workoutDate));
          if (beforeOrOn.length > 0) bw = Number(beforeOrOn[beforeOrOn.length - 1].weight);
          else bw = Number(sorted[0].weight);
        } else if (window.AppState.profile.weight) {
          bw = Number(window.AppState.profile.weight);
        }
        const effBw = bw * (isDips ? 0.9 : 1.0);
        return Math.max(0, ((effBw + wNum) * (1 + rNum / 30)) - effBw);
      }
      return wNum * (1 + rNum / 30);
    };

    // --- STATISTIKEN & ACHIEVEMENTS ---
    window.computeStats = function() {
      const workouts = window.AppState.workouts || [];
      const metrics = window.AppState.metrics || [];
      const groupByExercise = {};
      window.getMergedGroups().forEach(g => g.exercises.forEach(ex => { groupByExercise[ex] = g.name; }));

      let totalVolume = 0, cardioSessions = 0, cardioDistance = 0, rehabSessions = 0, prCount = 0;
      const loggedDates = new Set();
      const runningMax = {};
      const cutoff30 = new Date(); cutoff30.setDate(cutoff30.getDate() - 30);
      const groupsHit30d = new Set();

      const sorted = [...workouts].filter(w=>w&&w.date&&w.exercise).sort((a,b) => new Date(a.date) - new Date(b.date));
      sorted.forEach(w => {
        loggedDates.add(w.date);
        const cardio = window.isCardioExercise(w.exercise);
        const rehab = window.isRehabExercise(w.exercise);
        if (cardio) cardioSessions += (w.sets||[]).length;
        if (rehab) rehabSessions += 1;
        if (new Date(w.date) >= cutoff30 && groupByExercise[w.exercise]) groupsHit30d.add(groupByExercise[w.exercise]);
        (w.sets||[]).forEach(s => {
          if (cardio) {
            cardioDistance += Number(s.distance) || 0;
          } else if (s.reps != null && s.weight != null) {
            totalVolume += Number(s.reps) * Number(s.weight);
            const e1 = window.calculateE1RM(w.exercise, s.weight, s.reps, w.date);
            if (!runningMax[w.exercise] || e1 > runningMax[w.exercise]) { runningMax[w.exercise] = e1; prCount++; }
          }
        });
      });

      const dateList = Array.from(loggedDates).sort();
      let longestStreak = 0, run = 0, prevDate = null;
      dateList.forEach(d => {
        const cur = new Date(d);
        run = (prevDate && Math.round((cur - prevDate) / 86400000) === 1) ? run + 1 : 1;
        longestStreak = Math.max(longestStreak, run);
        prevDate = cur;
      });
      let currentStreak = 0;
      if (dateList.length) {
        let cursor = new Date();
        while (true) {
          const iso = cursor.toISOString().split('T')[0];
          if (loggedDates.has(iso)) { currentStreak++; cursor.setDate(cursor.getDate() - 1); }
          else break;
        }
      }
      const weekKeys = new Set();
      dateList.forEach(d => {
        const dt = new Date(d);
        const onejan = new Date(dt.getFullYear(), 0, 1);
        const week = Math.ceil((((dt - onejan) / 86400000) + onejan.getDay() + 1) / 7);
        weekKeys.add(dt.getFullYear() + '-W' + week);
      });

      return {
        totalWorkouts: workouts.length, totalVolume: Math.round(totalVolume), daysLogged: loggedDates.size,
        currentStreak, longestStreak, cardioSessions, cardioDistance: Math.round(cardioDistance * 10) / 10,
        rehabSessions, prCount, bodyLogCount: metrics.length, weeksActive: weekKeys.size,
        groupsHit30d: groupsHit30d.size
      };
    };

    window.getTrendData = function(data, type) {
      if (!data || data.length < 2) return null;
      const sorted = [...data].sort((a, b) => new Date(a.label) - new Date(b.label));
      const latestEntry = sorted[sorted.length - 1];
      const latestDate = new Date(latestEntry.label);
      
      function getHistVal(tDays, minDays, maxDays) {
        let bMatch = null, bDiff = Infinity;
        for (const e of sorted) {
          const eTime = new Date(e.label).getTime();
          const ageD = (latestDate.getTime() - eTime) / (1000 * 3600 * 24);
          if (ageD >= minDays && ageD <= maxDays) {
            const diff = Math.abs(ageD - tDays);
            if (diff < bDiff) { bDiff = diff; bMatch = e; }
          }
        }
        return bMatch;
      }
      
      const stEntry = getHistVal(20, 5, 35);
      const ltEntry = getHistVal(75, 55, 180);

      function evaluateChange(diff) {
        const abs = Math.abs(diff);
        const isNeg = diff < 0;
        let t1 = 0.1, t2 = 0.4, t3 = 1.2, t4 = 3.0; 
        if (type === 'fat' || type === 'muscle') { t1 = 0.1; t2 = 0.3; t3 = 0.8; t4 = 2.0; }
        if (abs <= t1) return { label: "stabil ➡️", style: "bg-gray-500/10 text-gray-400 border-gray-500/20" };
        
        let pIsGood = (type === 'muscle');
        if (isNeg) {
          const col = pIsGood ? "bg-red-500/10 text-red-400 border-red-500/20" : "bg-green-500/10 text-green-400 border-green-500/20";
          if (abs > t4) return { label: "stark abnehmend 📉", style: col };
          if (abs > t3) return { label: "abnehmend 📉", style: col };
          if (abs > t2) return { label: "tend. abnehmend ↘️", style: col };
          return { label: "leicht abnehmend ↘️", style: col };
        } else {
          const col = pIsGood ? "bg-green-500/10 text-green-400 border-green-500/20" : "bg-red-500/10 text-red-400 border-red-500/20";
          if (abs > t4) return { label: "stark zunehmend 📈", style: col };
          if (abs > t3) return { label: "zunehmend 📈", style: col };
          if (abs > t2) return { label: "tend. zunehmend ↗️", style: col };
          return { label: "leicht zunehmend ↗️", style: col };
        }
      }
      function fmtCompare(entry) {
        const days = Math.round((latestDate.getTime() - new Date(entry.label).getTime()) / (1000*3600*24));
        const rd = entry.label.split('-');
        const fmtDate = rd.length === 3 ? rd.reverse().slice(0,2).join('.') : entry.label;
        return { days, fmtDate };
      }

      return {
        shortTerm: stEntry ? { ...evaluateChange(latestEntry.value - stEntry.value), ...fmtCompare(stEntry) } : null,
        longTerm: ltEntry ? { ...evaluateChange(latestEntry.value - ltEntry.value), ...fmtCompare(ltEntry) } : null
      };
    };

    window.generateSVGChart = function(data, color, yLabel, referenceLines = [], chartId = 'c'+Math.random().toString(36).slice(2,8)) {
      if (!data || data.length < 2) return `<div class="flex items-center justify-center h-48 bg-black/40 rounded-xl border border-gray-800 text-gray-500 text-sm m-4">${window.t('not_enough_data')}</div>`;
      
      const parsed = data.map(d => ({ ...d, time: new Date(d.label).getTime() })).sort((a, b) => a.time - b.time);
      const w = 450, h = 220, m = { t: 25, r: 50, b: 30, l: 40 };
      const inW = w - m.l - m.r, inH = h - m.t - m.b;

      const minT = parsed[0].time;
      let tRange = parsed[parsed.length - 1].time - minT;
      if (tRange === 0) tRange = 1;

      const vals = parsed.map(d => d.value);
      const refs = referenceLines.map(r => r.value);
      const allVals = [...vals, ...refs];
      const minVRaw = Math.min(...allVals), maxVRaw = Math.max(...allVals);
      let vRangeRaw = maxVRaw - minVRaw;
      if (vRangeRaw === 0) vRangeRaw = 1;
      
      const minV = minVRaw - vRangeRaw * 0.1, maxV = maxVRaw + vRangeRaw * 0.1;
      const vRange = maxV - minV;

      const gx = t => m.l + ((t - minT) / tRange) * inW;
      const gy = v => h - m.b - ((v - minV) / vRange) * inH;

      const pts = parsed.map(d => `${gx(d.time)},${gy(d.value)}`).join(' ');
      const sma = parsed.map((d, i) => {
        const slice = parsed.slice(Math.max(0, i-19), i+1);
        const avg = slice.reduce((s,c)=>s+c.value, 0) / slice.length;
        return `${gx(d.time)},${gy(avg)}`;
      }).join(' ');

      let grids = "", ticks = [];
      if ((tRange / 86400000) >= 90) {
        let cur = new Date(new Date(minT).getFullYear(), new Date(minT).getMonth() + 1, 1);
        while (cur.getTime() <= parsed[parsed.length - 1].time) {
          const tx = gx(cur.getTime());
          grids += `<line x1="${tx}" y1="${m.t}" x2="${tx}" y2="${h-m.b}" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>`;
          ticks.push({ x: tx, l: cur.toLocaleDateString('de-DE', {month:'short', year:'2-digit'}) });
          cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
        }
      } else {
        for(let i=0; i<3; i++) {
          const tT = minT + (i/2)*tRange;
          const clo = parsed.reduce((p,c) => Math.abs(c.time-tT) < Math.abs(p.time-tT) ? c : p);
          let rawDate = clo.label.split('-');
          ticks.push({ x: gx(clo.time), l: rawDate.length === 3 ? rawDate.reverse().slice(0,2).join('.')+'.' : clo.label });
        }
        ticks = ticks.filter((v,i,a) => a.findIndex(t => Math.abs(t.x - v.x) < 20) === i);
      }

      const lastPt = parsed[parsed.length - 1];
      const circles = parsed.map(d => {
        const isLast = d === lastPt;
        return `<circle cx="${gx(d.time)}" cy="${gy(d.value)}" r="10" fill="transparent" onclick="window.showChartPoint('${chartId}','${d.label}',${d.value},'${yLabel}',this)" style="cursor:pointer;"/><circle cx="${gx(d.time)}" cy="${gy(d.value)}" r="${isLast?2.5:1.5}" fill="#111827" stroke="${color}" stroke-width="${isLast?2:1}" class="pointer-events-none"/>`;
      }).join('');
      const tickLabels = ticks.map(t => `<line x1="${t.x}" y1="${h-m.b}" x2="${t.x}" y2="${h-m.b+4}" stroke="#374151"/><text x="${t.x}" y="${h-m.b+16}" fill="#9ca3af" font-size="9" text-anchor="middle">${t.l}</text>`).join('');
      const lastFmt = (() => { const rd = lastPt.label.split('-'); return rd.length===3 ? rd.reverse().slice(0,2).join('.') : lastPt.label; })();

      return `
      <div class="w-full overflow-hidden bg-black/40 rounded-b-2xl border-t border-gray-800 p-4 relative">
        <svg viewBox="0 0 ${w} ${h}" class="w-full h-auto drop-shadow-lg overflow-visible">
          ${grids}
          <line x1="${m.l}" y1="${m.t}" x2="${w-m.r}" y2="${m.t}" stroke="#374151" stroke-dasharray="4"/>
          <line x1="${m.l}" y1="${m.t+inH/2}" x2="${w-m.r}" y2="${m.t+inH/2}" stroke="#374151" stroke-dasharray="4"/>
          <line x1="${m.l}" y1="${h-m.b}" x2="${w-m.r}" y2="${h-m.b}" stroke="#374151" stroke-dasharray="4"/>
          <text x="${m.l-5}" y="${m.t+4}" fill="#9ca3af" font-size="10" text-anchor="end">${maxVRaw.toFixed(1)} ${yLabel}</text>
          <text x="${m.l-5}" y="${h-m.b+4}" fill="#9ca3af" font-size="10" text-anchor="end">${minVRaw.toFixed(1)} ${yLabel}</text>
          ${referenceLines.map(ref => {
             const yPos = gy(ref.value);
             if (yPos >= m.t && yPos <= h - m.b) {
               return `<g><line x1="${m.l}" y1="${yPos}" x2="${w - m.r}" y2="${yPos}" stroke="#FF4D00" stroke-opacity="0.4" stroke-dasharray="2" /><text x="${w - m.r + 4}" y="${yPos + 3}" fill="#FF4D00" fill-opacity="0.7" font-size="8">${ref.label}</text></g>`;
             }
             return '';
          }).join('')}
          ${parsed.length > 2 ? `<polyline fill="none" stroke="#ffffff" stroke-width="2.5" points="${sma}" opacity="0.15" stroke-linecap="round" stroke-linejoin="round"/><polyline fill="none" stroke="#ffffff" stroke-width="1.0" stroke-dasharray="4 3" points="${sma}" opacity="0.8" stroke-linecap="round" stroke-linejoin="round"/>` : ''}
          <polyline fill="none" stroke="${color}" stroke-width="3" points="${pts}" stroke-linecap="round" stroke-linejoin="round"/>
          ${circles}
          ${tickLabels}
        </svg>
        <div id="chart-info-${chartId}" class="text-center text-xs text-gray-400 mt-2 pt-2 border-t border-gray-800/70">
          <span class="text-[#FF4D00] font-bold">${lastFmt}</span> — ${lastPt.value} ${yLabel}
        </div>
      </div>`;
    };

    window.showChartPoint = function(chartId, dateLabel, value, yLabel) {
      const el = document.getElementById('chart-info-' + chartId);
      if (!el) return;
      const rawDate = dateLabel.split('-');
      const fmtDate = rawDate.length === 3 ? rawDate.reverse().slice(0,2).join('.') : dateLabel;
      el.innerHTML = `<span class="text-[#FF4D00] font-bold">${fmtDate}</span> — ${value} ${yLabel}`;
    };

    window.callGeminiAPI = async function(prompt) {
      if(!apiKey) return "API Key fehlt. KI Funktionen im Offline-Modus limitiert.";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "Du bist Natural Bodybuilding Coach. Antworte in Deutsch." }] } };
      for (let attempt = 1, delay = 1000; attempt <= 3; attempt++, delay*=2) {
        try {
          const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (response.ok) return (await response.json()).candidates?.[0]?.content?.parts?.[0]?.text || "Fehler";
        } catch (e) { if(attempt===3) return "Netzwerkfehler."; await new Promise(r => setTimeout(r, delay)); }
      }
    }

        b.classList.add('text-gray-500');

      const activeBtn = document.getElementById(`nav-${tab}`);

        activeBtn.classList.remove('text-gray-500');
        activeBtn.classList.add('text-[#FF4D00]', 'drop-shadow-[0_0_8px_rgba(255,77,0,0.55)]');

    window.renderApp = function() {
      const tabs = ['dashboard', 'profile', 'program', 'workout', 'tools'];
      tabs.forEach(tab => {
        const el = document.getElementById(`tab-${tab}`);
        if(tab === window.AppState.activeTab) {
          el.classList.remove('hide');
          try {
            if(tab==='dashboard') el.innerHTML = window.renderDashboard();
            if(tab==='profile') el.innerHTML = window.renderProfile();
            if(tab==='program') el.innerHTML = window.renderProgram();

    window.computeDueReminders = function() {
      const rs = window.AppState.reminderSettings;
      if (!rs || !rs.enabled) return [];
      const workouts = window.AppState.workouts || [];
      const today = new Date();
      const daysSince = (checkFn) => {
        const matches = workouts.filter(w => w.date && checkFn(w.exercise)).sort((a,b)=>new Date(b.date)-new Date(a.date));
        if (!matches.length) return null;
        return Math.floor((today - new Date(matches[0].date)) / 86400000);
      };
      const cPlan = window.AppState.plans.find(p => p.isActive);
      const activeRoutines = cPlan ? window.AppState.routines.filter(r => r.planId === cPlan.id) : [];
      const planHas = (checkFn) => activeRoutines.some(r => (r.exercises||[]).some(slot => (slot||[]).some(ex => checkFn(ex))));

      const due = [];
      if (planHas(window.isCardioExercise)) {
        const cardioDays = daysSince(window.isCardioExercise);
        if (cardioDays === null || cardioDays >= rs.cardioDays) due.push({ type: 'cardio', label: window.t('reminder_cardio_due'), days: cardioDays });
      }
      if (planHas(window.isRehabExercise)) {
        const rehabDays = daysSince(window.isRehabExercise);
        if (rehabDays === null || rehabDays >= rs.rehabDays) due.push({ type: 'rehab', label: window.t('reminder_rehab_due'), days: rehabDays });
      }
      return due;
    };

    window.saveProf = function(e) {
      e.preventDefault();
      window.AppState.profile = {
        name: document.getElementById('p-name').value,
        age: document.getElementById('p-age').value,
        height: document.getElementById('p-height').value
      };
      window.saveToStorage('profile');
      const btn = document.getElementById('p-save-btn');
      btn.innerHTML = window.t('saved');
      setTimeout(()=> { btn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i> ' + window.t('save_profile'); lucide.createIcons(); }, 2000);
    };

    window.saveMet = function(e) {
      e.preventDefault();
      const dt = document.getElementById('m-date').value;
      const w = document.getElementById('m-w').value;
      const f = document.getElementById('m-f').value;
      const m = document.getElementById('m-m').value;
      if(!w && !f && !m) { alert(window.t("at_least_one_value")); return; }
      const entry = { id: Date.now().toString(), date: dt };
      if(w) entry.weight = Number(w);
      if(f) entry.fat = Number(f);
      if(m) entry.muscle = Number(m);
      window.AppState.metrics.push(entry);
      window.saveToStorage('metrics');
      window.renderApp();
    };

    window.updateReminderSettings = function() {
      const enabled = document.getElementById('rem-enabled').checked;
      const cardioDays = Math.max(1, Number(document.getElementById('rem-cardio').value) || 3);
      const rehabDays = Math.max(1, Number(document.getElementById('rem-rehab').value) || 3);
      window.AppState.reminderSettings = { enabled, cardioDays, rehabDays };
      localStorage.setItem('kraftkompass_reminder_settings', JSON.stringify(window.AppState.reminderSettings));
    };

    window.delMet = function(id) { 
      if(confirm(window.t("delete_entry_confirm"))) {
         window.AppState.metrics = window.AppState.metrics.filter(m => m.id !== id);
         window.saveToStorage('metrics');
         window.renderApp();
      }
    };

      e.preventDefault();
      const name = document.getElementById('new-plan-name').value.trim();
      const durEl = document.getElementById('new-plan-dur');
      let dur = durEl.value;
      if(dur==='custom') dur = document.getElementById('custom-dur').value.trim();
      if(!name) return;

      const today = new Date().toISOString().split('T')[0];
      window.AppState.plans.forEach(p => { if(p.isActive) { p.isActive = false; p.endDate = today; } });
      
      const newId = 'plan-'+Date.now();
      window.AppState.plans.push({id:newId, name, duration:dur||'unbegrenzt', isActive:true, startDate:today, endDate:null});
      window.saveToStorage('plans');
      window.setProgView('list');
    };

    window.createRout = function(e) {

      window.AppState.routines.push({id:rId, name:n, exercises:[], order:ro.length, planId:pId});
      window.saveToStorage('routines');
      window.renderApp();
    };
